<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Supabase credentials injected by CareDesk Pro at generation time -->
<meta name="x-supa-url" content="__SUPA_URL__">
<meta name="x-supa-key" content="__SUPA_KEY__">
<title>RN Management System</title>
<link rel="manifest" href="manifest.json">
<style>
/* ═══════════════════════════════════════════════════════
   CareDesk RN — Design system
   Self-contained: no external CSS. Tokens set at runtime.
   ═══════════════════════════════════════════════════════ */
:root {
  --brand:    #c8a96e;
  --brand2:   #4ec9b0;
  --bg:       #0e1014;
  --surface:  #171a21;
  --surface2: #1f242e;
  --surface3: #252b38;
  --border:   #272d39;
  --border2:  #313847;
  --text:     #e6e8ee;
  --dim:      #8a91a0;
  --muted:    #4a5162;
  --green:    #7ec97e;
  --amber:    #e5c07b;
  --red:      #e06c75;
  --blue:     #61afef;
  --r:        8px;
  --r-lg:     12px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe\ UI,Roboto,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
a{color:var(--brand);text-decoration:none}
h1,h2,h3,h4{font-weight:600;letter-spacing:-.2px}

/* ── Layout ── */
.app{display:flex;min-height:100vh}
.sidebar{width:236px;background:var(--surface);border-right:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:10}
.main{flex:1;margin-left:236px;padding:30px 36px 80px;min-height:100vh}
@media(max-width:900px){.sidebar{width:60px;padding:14px 8px}.sidebar .brand-name,.sidebar .nav-label,.sidebar .user-name,.sidebar .tagline{display:none}.main{margin-left:60px;padding:20px}}

/* ── Sidebar brand ── */
.brand{display:flex;align-items:center;gap:12px;padding:4px 8px 20px;border-bottom:1px solid var(--border);margin-bottom:14px}
.brand-logo{width:38px;height:38px;border-radius:10px;object-fit:contain;flex-shrink:0}
.brand-monogram{width:38px;height:38px;border-radius:10px;background:var(--brand);color:#0e1014;display:grid;place-items:center;font-weight:700;font-size:16px;flex-shrink:0}
.brand-name{font-weight:600;font-size:13.5px;line-height:1.3}
.tagline{font-size:11px;color:var(--dim);margin-top:1px}

/* ── Nav ── */
.nav{flex:1}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r);color:var(--dim);cursor:pointer;font-size:13px;margin-bottom:2px;transition:background .15s,color .15s;user-select:none}
.nav-item svg{width:17px;height:17px;flex-shrink:0;stroke:currentColor}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(200,169,110,.14);color:var(--brand)}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:12px 10px 5px;margin-top:4px}

/* ── Sidebar user ── */
.sidebar-user{padding:14px 8px 0;border-top:1px solid var(--border);margin-top:auto}
.user-chip{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#0e1014;display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.logout-btn{margin-top:10px;width:100%;background:none;border:1px solid var(--border);color:var(--dim);padding:7px;border-radius:var(--r);cursor:pointer;font-size:12px;transition:border-color .15s,color .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}

/* ── Page header ── */
.pagehead{margin-bottom:24px}
.pagehead-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pagehead h1{font-size:26px;font-weight:600}
.pagehead .sub{color:var(--dim);font-size:13px;margin-top:4px}

/* ── Cards / metrics ── */
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
@media(max-width:1100px){.metric-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.metric-grid{grid-template-columns:1fr}}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px}
.metric .m-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
.metric .m-value{font-size:28px;font-weight:700;margin-top:6px;color:var(--text)}
.metric .m-sub{font-size:11.5px;color:var(--dim);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px}
.card + .card{margin-top:18px}

/* ── Toolbar ── */
.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.toolbar-spacer{flex:1}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--dim)}
.search-wrap input{padding-left:32px;width:240px}
@media(max-width:600px){.search-wrap input{width:100%}}

/* ── Form inputs ── */
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:9px 11px;font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand)}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:5px}
.field{margin-bottom:15px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.field-row{grid-template-columns:1fr}}
textarea{resize:vertical;min-height:90px}

/* ── Buttons ── */
.btn{font-family:inherit;font-size:13px;font-weight:500;padding:9px 18px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:opacity .15s,background .15s}
.btn svg{width:15px;height:15px;stroke:currentColor;flex-shrink:0}
.btn-primary{background:var(--brand);color:#0e1014}
.btn-primary:hover{opacity:.88}
.btn-secondary{background:transparent;border-color:var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--brand);color:var(--brand)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.85}
.btn-ghost{background:none;border-color:transparent;color:var(--dim)}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}

/* ── Table ── */
.table-wrap{overflow-x:auto;border-radius:var(--r-lg)}
table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);font-size:13px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.cell-strong{font-weight:500}
.cell-mono{font-family:monospace;font-size:12px}
.cell-dim{color:var(--dim)}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:500;background:var(--surface2);color:var(--dim)}
.badge.green{background:rgba(126,201,126,.14);color:var(--green)}
.badge.amber{background:rgba(229,192,123,.14);color:var(--amber)}
.badge.red{background:rgba(224,108,117,.14);color:var(--red)}
.badge.blue{background:rgba(97,175,239,.14);color:var(--blue)}

/* ── Expiry highlight ── */
.expiring-soon td{background:rgba(229,192,123,.06)!important}
.expired td{background:rgba(224,108,117,.06)!important}

/* ── Empty state ── */
.empty{text-align:center;padding:56px 24px;color:var(--dim)}
.empty-icon{width:48px;height:48px;margin:0 auto 14px;stroke:var(--muted)}
.empty h4{font-size:16px;color:var(--text);margin-bottom:6px}
.empty p{font-size:13px;line-height:1.6}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal.wide{max-width:760px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 0}
.modal-head h3{font-size:18px}
.modal-body{padding:18px 22px}
.modal-foot{padding:12px 22px 18px;display:flex;gap:10px;justify-content:flex-end}
.close-x{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
.close-x:hover{color:var(--text)}

/* ── Toast ── */
.toast-host{position:fixed;top:18px;right:18px;z-index:80;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--brand);border-radius:var(--r);padding:10px 14px;font-size:13px;min-width:220px;max-width:340px;pointer-events:all;animation:toastIn .2s ease}
.toast.err{border-left-color:var(--red)}
.toast.info{border-left-color:var(--blue)}
.toast.out{opacity:0;transform:translateX(20px);transition:all .25s}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}}

/* ── Sections / tabs ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-head h2{font-size:19px}
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--r);padding:3px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--dim);transition:background .15s,color .15s;user-select:none}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tabpane{display:none}
.tabpane.active{display:block}

/* ── Login ── */
.login-wrap{min-height:100vh;display:grid;place-items:center;background:var(--bg);padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:38px;width:100%;max-width:400px;text-align:center}
.login-logo{width:60px;height:60px;border-radius:14px;background:var(--brand);color:#0e1014;display:grid;place-items:center;font-size:28px;font-weight:700;margin:0 auto 18px}
.login-logo img{width:60px;height:60px;border-radius:14px;object-fit:contain}
.login-card h2{font-size:22px;margin-bottom:4px}
.login-card .sub{color:var(--dim);font-size:13px;margin-bottom:26px}
.login-card input{text-align:left}
.login-card .field{text-align:left}
#login-error{color:var(--red);font-size:12.5px;margin-top:10px;min-height:18px}

/* ── Alert / banner ── */
.alert{border-radius:var(--r);padding:12px 16px;font-size:13px;line-height:1.5;margin-bottom:18px}
.alert.warn{background:rgba(229,192,123,.12);border:1px solid rgba(229,192,123,.3);color:var(--amber)}
.alert.info{background:rgba(97,175,239,.1);border:1px solid rgba(97,175,239,.25);color:var(--blue)}
.alert.success{background:rgba(126,201,126,.1);border:1px solid rgba(126,201,126,.25);color:var(--green)}

/* ── DSHS Print styles ── */
@media print{
  .sidebar,.toolbar,.btn,.tabs,.tab,.no-print{display:none!important}
  .main{margin:0;padding:0}
  .print-block{display:block!important}
  body{background:#fff;color:#000}
  table{border:1px solid #ccc}
  th,td{border:1px solid #ccc;padding:6px 8px}
}
.print-block{display:none}

/* ── Loader ── */
.loader{display:flex;gap:5px;justify-content:center;padding:40px}
.loader span{width:8px;height:8px;border-radius:50%;background:var(--brand);animation:pulse .8s ease-in-out infinite}
.loader span:nth-child(2){animation-delay:.15s}
.loader span:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ═══════════════════════════════════════════════════════
   CareDesk RN — Application Core
   ═══════════════════════════════════════════════════════ */

// ── Config from onboarding injection or meta tags ──
(function () {
  var o = window.__CDP_ONBOARD__ || {};
  var meta = function (n) { var m = document.querySelector('meta[name="' + n + '"]'); return m ? m.content : ''; };
  window.RN = {
    supaUrl:       o.supaUrl       || meta('x-supa-url'),
    supaKey:       o.supaKey       || meta('x-supa-key'),
    name:          o.businessName  || 'RN Management System',
    tagline:       o.tagline       || 'Delegation management · Washington State',
    license:       o.licenseNumber || '',
    phone:         o.phone         || '',
    address:       o.address       || '',
    primaryColor:  o.primaryColor  || '#c8a96e',
    secondaryColor:o.secondaryColor|| '#4ec9b0',
    logoBase64:    o.logoBase64    || '',
    adminEmail:    o.adminEmail    || '',
    clientId:      o.clientId      || ''
  };
})();

// Apply brand colours
(function () {
  var r = document.documentElement.style;
  r.setProperty('--brand',  window.RN.primaryColor);
  r.setProperty('--brand2', window.RN.secondaryColor);
})();

// ── Supabase client ──
var _sb = null;
function getSb() {
  if (!_sb && window.supabase && RN.supaUrl && RN.supaKey) {
    _sb = window.supabase.createClient(RN.supaUrl, RN.supaKey);
  }
  return _sb;
}

// ── State ──
var APP = { user: null, page: 'dashboard', data: {} };

// ── DOM helpers ──
var $ = function (s, r) { return (r || document).querySelector(s); };
var $$ = function (s, r) { return Array.from((r || document).querySelectorAll(s)); };
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
function el(h) { var t = document.createElement('template'); t.innerHTML = h.trim(); return t.content.firstElementChild; }
var fmtDate = function (d) { if (!d) return '—'; var x = new Date(d); return isNaN(x) ? '—' : x.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); };
var today   = function () { return new Date().toISOString().slice(0, 10); };
var addDays = function (d, n) { var x = new Date(d); x.setDate(x.getDate() + n); return x.toISOString().slice(0, 10); };

// ── Toast ──
function toast(msg, type) {
  var h = $('#toast-host');
  var t = el('<div class="toast' + (type === 'error' ? ' err' : type === 'info' ? ' info' : '') + '">' + esc(msg) + '</div>');
  h.appendChild(t);
  while (h.children.length > 3) h.removeChild(h.firstChild);
  setTimeout(function () { t.classList.add('out'); setTimeout(function () { t.remove(); }, 280); }, 3200);
}

// ── Auth ──
function setupLogin() {
  // Brand the login screen from onboarding data
  if (RN.name) $('#login-title').textContent = RN.name;
  if (RN.tagline) $('#login-tagline').textContent = RN.tagline;
  if (RN.logoBase64) {
    var w = $('#login-logo-wrap');
    w.innerHTML = '<img src="' + esc(RN.logoBase64) + '" alt="logo">';
  } else {
    var initials = RN.name.split(/\s+/).filter(Boolean).slice(0, 2).map(function (w) { return w[0]; }).join('').toUpperCase() || 'RN';
    $('#login-monogram').textContent = initials;
  }

  $('#li-submit').addEventListener('click', doLogin);
  $('#li-pass').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
  $('#li-email').addEventListener('keydown', function (e) { if (e.key === 'Enter') $('#li-pass').focus(); });
}

async function doLogin() {
  var btn = $('#li-submit'), err = $('#login-error');
  var email = $('#li-email').value.trim(), pass = $('#li-pass').value;
  if (!email || !pass) { err.textContent = 'Enter your email and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
  var sb = getSb();
  if (!sb) { err.textContent = 'Supabase is not configured for this system.'; btn.disabled = false; btn.textContent = 'Sign in'; return; }
  var res = await sb.auth.signInWithPassword({ email: email, password: pass });
  if (res.error) { err.textContent = res.error.message; btn.disabled = false; btn.textContent = 'Sign in'; return; }
  APP.user = res.data.user;
  showApp();
}

async function checkSession() {
  var sb = getSb(); if (!sb) { showLogin(); return; }
  var res = await sb.auth.getSession();
  if (res.data && res.data.session) {
    APP.user = res.data.session.user;
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  $('#login-screen').style.display = '';
  $('#app-shell').style.display = 'none';
}

function showApp() {
  $('#login-screen').style.display = 'none';
  $('#app-shell').style.display = 'flex';
  applyBranding();
  navigate('dashboard');
}

function applyBranding() {
  if (RN.name) { $('#sb-name').textContent = RN.name; document.title = RN.name; }
  if (RN.tagline) $('#sb-tagline').textContent = RN.tagline;
  var initials = RN.name.split(/\s+/).filter(Boolean).slice(0, 2).map(function (w) { return w[0]; }).join('').toUpperCase() || 'RN';
  $('#sb-monogram').textContent = initials;
  if (APP.user) {
    var email = APP.user.email || '';
    $('#user-name').textContent = email.split('@')[0];
    $('#user-avatar').textContent = (email[0] || 'R').toUpperCase();
  }
}

$('#logout-btn').addEventListener('click', async function () {
  var sb = getSb(); if (sb) await sb.auth.signOut();
  APP.user = null;
  showLogin();
});

// ── Generic CRUD helpers ──
async function dbFetch(table, filter) {
  var sb = getSb(); if (!sb) return [];
  var q = sb.from(table).select('*').order('created_at', { ascending: false });
  if (filter) q = filter(q);
  var res = await q;
  if (res.error) { console.error(table, res.error); return []; }
  return res.data || [];
}

async function dbInsert(table, row) {
  var sb = getSb(); if (!sb) { toast('Not connected.', 'error'); return null; }
  var res = await sb.from(table).insert(row).select();
  if (res.error) { toast('Save failed: ' + res.error.message, 'error'); return null; }
  return res.data && res.data[0];
}

async function dbUpdate(table, id, row) {
  var sb = getSb(); if (!sb) { toast('Not connected.', 'error'); return false; }
  var res = await sb.from(table).update(row).eq('id', id);
  if (res.error) { toast('Update failed: ' + res.error.message, 'error'); return false; }
  return true;
}

async function dbDelete(table, id) {
  var sb = getSb(); if (!sb) { toast('Not connected.', 'error'); return false; }
  var res = await sb.from(table).delete().eq('id', id);
  if (res.error) { toast('Delete failed: ' + res.error.message, 'error'); return false; }
  return true;
}

// ── Generic list page renderer ──
function renderListPage(opts) {
  /* opts: { title, sub, addLabel, columns, rows, onAdd, onEdit, onDelete, rowClass } */
  var mc = $('#main-content');
  var filtered = opts.rows;

  function buildTable(rows) {
    if (!rows.length) {
      return '<div class="empty"><svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 17H5a2 2 0 0 0-2 2v0a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v0a2 2 0 0 0-2-2h-4"/><path d="M12 3v10"/><path d="m9 10 3 3 3-3"/></svg><h4>No records yet</h4><p>Use the button above to add your first entry.</p></div>';
    }
    return '<div class="table-wrap"><table><thead><tr>' +
      opts.columns.map(function (c) { return '<th>' + esc(c.label) + '</th>'; }).join('') +
      '<th></th></tr></thead><tbody>' +
      rows.map(function (row) {
        var rc = opts.rowClass ? opts.rowClass(row) : '';
        return '<tr class="' + rc + '">' +
          opts.columns.map(function (c) {
            var v = row[c.key];
            if (c.badge) { var bc = c.badge(v); return '<td><span class="badge ' + esc(bc) + '">' + esc(v || '—') + '</span></td>'; }
            if (c.date) return '<td class="cell-dim">' + esc(fmtDate(v)) + '</td>';
            if (c.strong) return '<td class="cell-strong">' + esc(v || '—') + '</td>';
            return '<td>' + esc(v || '—') + '</td>';
          }).join('') +
          '<td style="white-space:nowrap"><button class="btn btn-ghost btn-sm" data-edit="' + esc(row.id) + '">Edit</button>' +
          '<button class="btn btn-ghost btn-sm" style="color:var(--red)" data-del="' + esc(row.id) + '">Delete</button></td></tr>';
      }).join('') +
      '</tbody></table></div>';
  }

  mc.innerHTML = '<div class="pagehead"><div class="pagehead-row">' +
    '<div><h1>' + esc(opts.title) + '</h1><div class="sub">' + esc(opts.sub) + '</div></div>' +
    (opts.onAdd ? '<button class="btn btn-primary" id="pg-add"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' + esc(opts.addLabel || 'Add') + '</button>' : '') +
    '</div></div>' +
    '<div class="toolbar no-print">' +
    '<div class="search-wrap"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="pg-search" placeholder="Search…"></div>' +
    '</div>' +
    '<div id="pg-table">' + buildTable(filtered) + '</div>';

  if (opts.onAdd) {
    var ab = $('#pg-add'); if (ab) ab.onclick = opts.onAdd;
  }

  $('#pg-search').oninput = function (e) {
    var q = e.target.value.toLowerCase();
    filtered = q ? opts.rows.filter(function (r) {
      return Object.values(r).some(function (v) { return String(v || '').toLowerCase().includes(q); });
    }) : opts.rows;
    $('#pg-table').innerHTML = buildTable(filtered);
    wireRowBtns();
  };

  function wireRowBtns() {
    $$('[data-edit]', $('#pg-table')).forEach(function (b) {
      b.onclick = function () { if (opts.onEdit) opts.onEdit(opts.rows.find(function (r) { return r.id === b.dataset.edit; })); };
    });
    $$('[data-del]', $('#pg-table')).forEach(function (b) {
      b.onclick = function () {
        if (confirm('Delete this record?')) {
          if (opts.onDelete) opts.onDelete(b.dataset.del);
        }
      };
    });
  }
  wireRowBtns();
}

// ── Generic modal form ──
function openForm(opts) {
  /* opts: { title, fields, values, onSave } */
  var body = opts.fields.map(function (f) {
    var v = esc(opts.values && opts.values[f.key] != null ? opts.values[f.key] : '');
    var inp = '';
    if (f.type === 'textarea') {
      inp = '<textarea id="ff-' + f.key + '" rows="3">' + v + '</textarea>';
    } else if (f.type === 'select') {
      inp = '<select id="ff-' + f.key + '">' + (f.options || []).map(function (o) {
        return '<option value="' + esc(o) + '"' + (v === esc(o) ? ' selected' : '') + '>' + esc(o) + '</option>';
      }).join('') + '</select>';
    } else {
      inp = '<input type="' + (f.type || 'text') + '" id="ff-' + f.key + '" value="' + v + '"' + (f.placeholder ? ' placeholder="' + esc(f.placeholder) + '"' : '') + '>';
    }
    return '<div class="field"><label>' + esc(f.label) + '</label>' + inp + '</div>';
  }).join('');

  openModal(
    '<div class="modal-head"><h3>' + esc(opts.title) + '</h3><button class="close-x" id="m-close">&times;</button></div>' +
    '<div class="modal-body">' + body + '</div>' +
    '<div class="modal-foot"><button class="btn btn-secondary" id="m-cancel">Cancel</button><button class="btn btn-primary" id="m-save">Save</button></div>'
  );

  $('#m-close').onclick = $('#m-cancel').onclick = closeModal;
  $('#m-save').onclick = async function () {
    var data = {};
    opts.fields.forEach(function (f) {
      var el = $('#ff-' + f.key);
      data[f.key] = el ? el.value.trim() : '';
    });
    if (opts.required) {
      for (var i = 0; i < opts.required.length; i++) {
        if (!data[opts.required[i]]) { toast('Please fill all required fields.', 'error'); return; }
      }
    }
    $('#m-save').disabled = true; $('#m-save').textContent = 'Saving…';
    await opts.onSave(data);
    closeModal();
  };
}

// ── DASHBOARD ──
async function renderDashboard() {
  var mc = $('#main-content');
  mc.innerHTML = '<div class="loader"><span></span><span></span><span></span></div>';

  var sb = getSb();
  var facilities = await dbFetch('facilities');
  var clients    = await dbFetch('clients');
  var deleg      = await dbFetch('delegation_cases');
  var creds      = await dbFetch('credentials');

  var active   = deleg.filter(function (d) { return d.status === 'Active'; }).length;
  var expiring = creds.filter(function (c) { return c.expiry_date && c.expiry_date <= addDays(today(), 30) && c.expiry_date >= today(); }).length;
  var expired  = creds.filter(function (c) { return c.expiry_date && c.expiry_date < today(); }).length;

  // Expiring delegations within 14 days
  var expiringDeleg = deleg.filter(function (d) { return d.expiry_date && d.expiry_date <= addDays(today(), 14) && d.expiry_date >= today(); });

  mc.innerHTML =
    '<div class="pagehead"><h1>Dashboard</h1><div class="sub">Welcome back. Here\'s your caseload overview.</div></div>' +
    '<div class="metric-grid">' +
    metric('AFH Facilities', facilities.length, 'Under your delegation') +
    metric('Active Clients', clients.filter(function (c) { return c.status === 'active'; }).length, 'Active status') +
    metric('Active Delegations', active, 'Current delegation cases') +
    metric('Expiring Credentials', expiring + expired, expired ? 'badge:red:' + expired + ' expired' : 'Within 30 days') +
    '</div>' +
    (expiringDeleg.length ? '<div class="alert warn"><strong>⚠ ' + expiringDeleg.length + ' delegation case' + (expiringDeleg.length > 1 ? 's' : '') + ' expiring within 14 days</strong><br>' + expiringDeleg.map(function (d) { return esc(d.care_task || 'Task') + ' · ' + esc(d.facility || '') + ' — expires ' + esc(fmtDate(d.expiry_date)); }).join('<br>') + '</div>' : '') +
    '<div class="card"><div class="section-head"><h2>Recent Delegation Cases</h2><button class="btn btn-secondary btn-sm" onclick="navigate(\'delegation\')">View all</button></div>' +
    (deleg.length ? '<div class="table-wrap"><table><thead><tr><th>Facility</th><th>Client</th><th>Task</th><th>Caregiver</th><th>Expires</th><th>Status</th></tr></thead><tbody>' +
      deleg.slice(0, 8).map(function (d) {
        var bc = d.status === 'Active' ? 'green' : d.status === 'Expiring Soon' ? 'amber' : d.status === 'Expired' ? 'red' : 'blue';
        return '<tr><td>' + esc(d.facility || '—') + '</td><td>' + esc(d.client_name || '—') + '</td><td>' + esc(d.care_task || '—') + '</td><td>' + esc(d.caregiver || '—') + '</td><td class="cell-dim">' + esc(fmtDate(d.expiry_date)) + '</td><td><span class="badge ' + bc + '">' + esc(d.status || '—') + '</span></td></tr>';
      }).join('') + '</tbody></table></div>' :
      '<div class="empty"><h4>No delegation cases</h4><p>Add your first case under Delegation Cases.</p></div>') +
    '</div>';

  function metric(label, value, sub) {
    var badgeMatch = sub && sub.match(/^badge:(\w+):(.+)/);
    var subHtml = badgeMatch
      ? '<span class="badge ' + badgeMatch[1] + '">' + esc(badgeMatch[2]) + '</span>'
      : '<div class="m-sub">' + esc(sub) + '</div>';
    return '<div class="metric"><div class="m-label">' + esc(label) + '</div><div class="m-value">' + esc(String(value)) + '</div>' + subHtml + '</div>';
  }
}

// ── CREDENTIALS ──
async function renderCredentials() {
  var rows = await dbFetch('credentials');
  rows = rows.map(function (c) {
    c._expired  = c.expiry_date && c.expiry_date < today();
    c._expiring = c.expiry_date && !c._expired && c.expiry_date <= addDays(today(), 30);
    return c;
  });
  renderListPage({
    title: 'Credentials', sub: 'Caregiver training and certification tracking. Rows highlighted when expiring.',
    addLabel: 'Add Credential',
    columns: [
      { key: 'caregiver', label: 'Caregiver', strong: true },
      { key: 'facility', label: 'Facility' },
      { key: 'credential_type', label: 'Type' },
      { key: 'issue_date', label: 'Issued', date: true },
      { key: 'expiry_date', label: 'Expires', date: true },
      { key: 'status', label: 'Status', badge: function (v) { return v === 'valid' ? 'green' : v === 'expired' ? 'red' : 'amber'; } }
    ],
    rows: rows,
    rowClass: function (r) { return r._expired ? 'expired' : r._expiring ? 'expiring-soon' : ''; },
    onAdd: function () {
      openForm({
        title: 'Add Credential', required: ['caregiver', 'credential_type'],
        fields: [
          { key: 'caregiver', label: 'Caregiver name' },

          { key: 'credential_type', label: 'Credential type', type: 'select', options: ['CPR/AED', 'First Aid', 'Nurse Delegation Basic', 'Nurse Delegation Advanced', 'Food Handler', 'TB Test', 'Background Check', 'Bloodborne Pathogens', 'Dementia Training', 'Medication Administration'] },
          { key: 'issue_date', label: 'Issue date', type: 'date' },
          { key: 'expiry_date', label: 'Expiry date', type: 'date' },
          { key: 'status', label: 'Status', type: 'select', options: ['valid', 'expiring', 'expired', 'pending'] },
          { key: 'notes', label: 'Notes', type: 'textarea' }
        ],
        onSave: async function (data) {
          await dbInsert('credentials', data); toast('Credential added.'); renderCredentials();
        }
      });
    },
    onEdit: function (row) {
      openForm({
        title: 'Edit Credential', values: row, required: ['caregiver', 'credential_type'],
        fields: [
          { key: 'caregiver', label: 'Caregiver name' },
          { key: 'facility', label: 'Facility' },
          { key: 'credential_type', label: 'Credential type', type: 'select', options: ['CPR/AED', 'First Aid', 'Nurse Delegation Basic', 'Nurse Delegation Advanced', 'Food Handler', 'TB Test', 'Background Check', 'Bloodborne Pathogens', 'Dementia Training', 'Medication Administration'] },
          { key: 'issue_date', label: 'Issue date', type: 'date' },
          { key: 'expiry_date', label: 'Expiry date', type: 'date' },

  var rnName = RN.name || 'RN';
  var rnLicense = RN.license || '__RN LICENSE__';
  var rnPhone = RN.phone || '__PHONE__';

  var fields = {
    '13-678': [
      { label: 'Client Name', key: 'client_name' },
      { label: 'Date of Birth', key: 'dob', type: 'date' },
      { label: 'Facility Name', key: 'facility_name', default: '' },
      { label: 'Facility Address', key: 'facility_addr' },
      { label: 'Care Tasks to Delegate', key: 'care_tasks', type: 'textarea' },
      { label: 'Caregiver Name', key: 'caregiver_name' },
      { label: 'Delegation Date', key: 'delegation_date', type: 'date' },
      { label: 'Expiry Date', key: 'expiry_date', type: 'date' },
      { label: 'Special Instructions', key: 'instructions', type: 'textarea' }
    ],
    '13-681': [
      { label: 'Caregiver Name', key: 'caregiver_name' },
      { label: 'Facility', key: 'facility_name' },
      { label: 'Training Topic', key: 'training_topic', type: 'textarea' },
      { label: 'Training Date', key: 'training_date', type: 'date' },
      { label: 'Trainer Name', key: 'trainer_name', default: rnName },
      { label: 'Hours Completed', key: 'hours', type: 'number' }
    ],
    '10-217': [
      { label: 'Client Name', key: 'client_name' },
      { label: 'Facility Name', key: 'facility_name' },
      { label: 'Incident Date', key: 'incident_date', type: 'date' },
      { label: 'Incident Time', key: 'incident_time', type: 'time' },
      { label: 'Incident Type', key: 'incident_type', type: 'select', options: ['Fall', 'Medication Error', 'Behavioral Incident', 'Medical Emergency', 'Elopement', 'Injury', 'Other'] },
      { label: 'Description of Incident', key: 'description', type: 'textarea' },
      { label: 'Actions Taken', key: 'actions', type: 'textarea' },
      { label: 'Reported By', key: 'reported_by', default: rnName }
    ],
    '13-893': [
      { label: 'Client Name', key: 'client_name' },
      { label: 'Facility', key: 'facility_name' },
      { label: 'Review Date', key: 'review_date', type: 'date' },
      { label: 'Caregiver Name', key: 'caregiver_name' },
      { label: 'Tasks Reviewed', key: 'tasks', type: 'textarea' },
      { label: 'Changes / Updates', key: 'changes', type: 'textarea' },
      { label: 'New Expiry Date', key: 'new_expiry', type: 'date' }
    ]
  };

  var formFields = fields[code] || [
    { label: 'Client / Resident Name', key: 'client_name' },
    { label: 'Facility Name', key: 'facility_name' },
    { label: 'Date', key: 'form_date', type: 'date' },
    { label: 'Additional Notes', key: 'notes', type: 'textarea' }
  ];

  var fieldHtml = formFields.map(function (f) {
    var v = esc(f.default || '');
    var inp;
    if (f.type === 'textarea') inp = '<textarea id="pf-' + f.key + '" style="width:100%;min-height:70px;background:#fff;border:1px solid #ccc;padding:6px;font-family:inherit;font-size:13px;color:#000">' + v + '</textarea>';
    else if (f.type === 'select') inp = '<select id="pf-' + f.key + '" style="width:100%;background:#fff;border:1px solid #ccc;padding:6px;font-family:inherit;font-size:13px;color:#000">' + (f.options || []).map(function (o) { return '<option>' + esc(o) + '</option>'; }).join('') + '</select>';
    else inp = '<input type="' + (f.type || 'text') + '" id="pf-' + f.key + '" value="' + v + '" style="width:100%;background:#fff;border:1px solid #ccc;padding:6px;font-family:inherit;font-size:13px;color:#000">';
    return '<tr><td style="padding:7px 10px;font-size:12px;font-weight:600;color:#444;white-space:nowrap;width:40%">' + esc(f.label) + '</td><td style="padding:5px 10px">' + inp + '</td></tr>';
  }).join('');

  openModal(
    '<div class="modal-head">' +
      '<div><h3>DSHS Form ' + esc(code) + '</h3><div style="font-size:12px;color:var(--dim);margin-top:2px">' + esc(name) + '</div></div>' +
      '<button class="close-x" id="m-close">&times;</button>' +

      '<div id="print-form-area" style="font-family:Georgia,serif;color:#000;background:#fff;padding:20px;border-radius:6px">' +
        '<div style="text-align:center;border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px">' +
          '<div style="font-size:11px;color:#666">Washington State Department of Social and Health Services</div>' +
          '<div style="font-size:20px;font-weight:700;margin:6px 0">Form ' + esc(code) + '</div>' +
          '<div style="font-size:14px;font-weight:600">' + esc(name) + '</div>' +
          '<div style="font-size:11px;color:#666;margin-top:6px">RN: ' + esc(rnName) + ' · License: ' + esc(rnLicense) + ' · Phone: ' + esc(rnPhone) + '</div>' +
        '</div>' +
        '<table style="width:100%;border-collapse:collapse">' + fieldHtml + '</table>' +
        '<div style="margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:30px">' +
          '<div><div style="border-top:1px solid #000;padding-top:4px;font-size:11px;color:#666">RN Signature / Date</div></div>' +
          '<div><div style="border-top:1px solid #000;padding-top:4px;font-size:11px;color:#666">Caregiver Signature / Date</div></div>' +
        '</div>' +
      '</div>' +
    '</div>' +

      '<button class="btn btn-secondary" id="m-close2">Cancel</button>' +
      '<button class="btn btn-primary" onclick="window.print()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print / Save PDF</button>' +
    '</div>',
    true
  );
  $('#m-close').onclick = $('#m-close2').onclick = closeModal;
}

async function renderSettings() {

    '<div class="pagehead"><h1>Settings</h1><div class="sub">System profile and account information.</div></div>' +
    '<div class="card">' +
      '<h3 style="margin-bottom:16px">Practice Information</h3>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;row-gap:10px">' +
        kv('Business Name', RN.name) +
        kv('RN License', RN.license || '—') +
        kv('Phone', RN.phone || '—') +
        kv('Address', RN.address || '—') +
        kv('Admin Email', RN.adminEmail || '—') +
        kv('System ID', RN.clientId || '—') +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<h3 style="margin-bottom:16px">Account</h3>' +
      '<div id="profile-info"><div class="loader"><span></span><span></span><span></span></div></div>' +
      '<div style="margin-top:16px"><button class="btn btn-danger btn-sm" id="set-signout">Sign out</button></div>' +
    '</div>';

  $('#set-signout').onclick = async function () {
    var sb = getSb(); if (sb) await sb.auth.signOut();
    APP.user = null; showLogin();
  };

  // Load profile
  var sb = getSb();
  if (sb && APP.user) {
    var res = await sb.from('profiles').select('*').eq('id', APP.user.id).single();
    var p = res.data || {};
    $('#profile-info').innerHTML =
      kv('Email', APP.user.email) +
      kv('Display Name', p.full_name || '—') +
      kv('License on File', p.license_number || '—') +
      kv('Role', p.role || '—');
  } else {
    $('#profile-info').innerHTML = kv('Email', APP.user ? APP.user.email : '—');
  }

  function kv(k, v) {
    return '<div style="padding:6px 0;border-bottom:1px solid var(--border)">' +
      '<span style="color:var(--dim);font-size:12px">' + esc(k) + '</span>' +
      '<span style="float:right;font-weight:500">' + esc(v) + '</span></div>';
  }
}

function kv(k, v) {
  return '<div style="padding:7px 0;border-bottom:1px solid var(--border);grid-column:span 1">' +
    '<span style="color:var(--dim);font-size:12px">' + esc(k) + '</span>' +
    '<span style="float:right;font-weight:500;max-width:60%;text-align:right">' + esc(v) + '</span></div>';
}

document.addEventListener('DOMContentLoaded', function () {
  setupLogin();
  checkSession();
});
